<svg xmlns="http://www.w3.org/2000/svg">
  <!-- Professional Top-Down Stage Plot Icons (Brutalist Tec-Line) -->
  
  <symbol id="drum" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="30" fill="currentColor" opacity="0.1" stroke="currentColor" stroke-width="2" />
    <path d="M50 20 L50 15 M50 80 L50 85 M20 50 L15 50 M80 50 L85 50" stroke="currentColor" stroke-width="1" />
    <circle cx="25" cy="65" r="14" stroke="currentColor" stroke-width="2" />
    <path d="M15 65 L35 65" stroke="currentColor" stroke-width="0.5" stroke-dasharray="2 2" />
    <circle cx="15" cy="45" r="12" stroke="currentColor" stroke-width="1.5" opacity="0.6" />
    <circle cx="38" cy="30" r="12" stroke="currentColor" stroke-width="2" />
    <circle cx="62" cy="30" r="12" stroke="currentColor" stroke-width="2" />
    <circle cx="75" cy="65" r="16" stroke="currentColor" stroke-width="2" />
    <circle cx="85" cy="35" r="14" stroke="currentColor" stroke-width="1" opacity="0.4" />
    <circle cx="15" cy="15" r="12" stroke="currentColor" stroke-width="1" opacity="0.4" />
  </symbol>

  <symbol id="guitar" viewBox="0 0 100 100">
    <path d="M50 10 L45 30 L45 70 Q45 85 50 90 Q55 85 55 70 L55 30 Z" fill="currentColor" />
    <path d="M40 70 Q40 95 50 95 Q60 95 60 70 Z" fill="currentColor" opacity="0.2" stroke="currentColor" stroke-width="2" />
    <path d="M45 40 L55 40 M45 50 L55 50 M45 60 L55 60" stroke="white" stroke-width="0.5" />
  </symbol>

  <symbol id="guitar-acoustic" viewBox="0 0 100 100">
    <path d="M50 10 L48 35 L48 65 Q48 95 50 98 Q52 95 52 65 L52 35 Z" fill="currentColor" />
    <path d="M35 70 Q35 98 50 98 Q65 98 65 70 Q65 50 50 50 Q35 50 35 70" fill="currentColor" opacity="0.2" stroke="currentColor" stroke-width="2" />
    <circle cx="50" cy="72" r="6" fill="black" stroke="currentColor" stroke-width="1" />
  </symbol>

  <symbol id="bass" viewBox="0 0 100 100">
    <path d="M50 5 L46 35 L46 75 Q46 95 50 98 Q54 95 54 75 L54 35 Z" fill="currentColor" />
    <path d="M38 75 Q38 98 50 98 Q62 98 62 75 Z" fill="currentColor" opacity="0.2" stroke="currentColor" stroke-width="2" />
    <rect x="47" y="60" width="6" height="4" fill="white" />
    <rect x="47" y="68" width="6" height="4" fill="white" />
  </symbol>

  <symbol id="keyboard" viewBox="0 0 100 100">
    <rect x="5" y="35" width="90" height="30" stroke="currentColor" stroke-width="2" fill="currentColor" opacity="0.1" />
    <path d="M15 35 V65 M25 35 V65 M35 35 V65 M45 35 V65 M55 35 V65 M65 35 V65 M75 35 V65 M85 35 V65" stroke="currentColor" stroke-width="0.5" opacity="0.5" />
    <rect x="12" y="35" width="6" height="15" fill="currentColor" />
    <rect x="22" y="35" width="6" height="15" fill="currentColor" />
    <rect x="42" y="35" width="6" height="15" fill="currentColor" />
    <rect x="52" y="35" width="6" height="15" fill="currentColor" />
    <rect x="62" y="35" width="6" height="15" fill="currentColor" />
  </symbol>

  <symbol id="monitor" viewBox="0 0 100 100">
    <path d="M10 80 L90 80 L75 25 L25 25 Z" fill="currentColor" opacity="0.1" stroke="currentColor" stroke-width="2" />
    <rect x="30" y="45" width="40" height="20" stroke="currentColor" stroke-width="1" stroke-dasharray="2 2" />
    <circle cx="50" cy="55" r="8" stroke="currentColor" stroke-width="1.5" />
    <path d="M10 80 L5 90 M90 80 L95 90" stroke="currentColor" stroke-width="1" opacity="0.3" />
  </symbol>

  <symbol id="mic" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="5" fill="currentColor" />
    <path d="M50 50 L30 85 M50 50 L70 85 M50 50 L50 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
    <rect x="45" y="10" width="10" height="15" rx="5" fill="currentColor" opacity="0.8" />
  </symbol>

  <symbol id="amp" viewBox="0 0 100 100">
    <rect x="15" y="35" width="70" height="55" stroke="currentColor" stroke-width="2" fill="currentColor" opacity="0.05" />
    <rect x="20" y="10" width="60" height="20" stroke="currentColor" stroke-width="2" fill="currentColor" />
    <circle cx="35" cy="55" r="10" stroke="currentColor" stroke-width="1" />
    <circle cx="65" cy="55" r="10" stroke="currentColor" stroke-width="1" />
    <circle cx="35" cy="75" r="10" stroke="currentColor" stroke-width="1" />
    <circle cx="65" cy="75" r="10" stroke="currentColor" stroke-width="1" />
  </symbol>

  <symbol id="speaker" viewBox="0 0 100 100">
    <rect x="25" y="5" width="50" height="90" stroke="currentColor" stroke-width="2" fill="currentColor" opacity="1" />
    <circle cx="50" cy="30" r="15" stroke="currentColor" stroke-width="1.5" />
    <circle cx="50" cy="70" r="12" stroke="currentColor" stroke-width="1.5" />
  </symbol>

  <symbol id="di" viewBox="0 0 100 100">
    <rect x="25" y="35" width="50" height="30" rx="4" stroke="currentColor" stroke-width="2" fill="currentColor" opacity="0.2" />
    <circle cx="35" cy="50" r="3" fill="currentColor" />
    <rect x="55" y="45" width="10" height="10" stroke="currentColor" stroke-width="1" />
    <circle cx="45" cy="50" r="2" fill="currentColor" opacity="0.5" />
  </symbol>

  <symbol id="power" viewBox="0 0 100 100">
    <rect x="30" y="30" width="40" height="40" rx="5" stroke="#ccff00" stroke-width="2" stroke-dasharray="4 2" />
    <path d="M50 40 L60 52 H40 L50 65" fill="#ccff00" />
    <circle cx="50" cy="50" r="25" stroke="#ccff00" stroke-width="1" opacity="0.2" />
  </symbol>

  <symbol id="riser" viewBox="0 0 100 100">
    <rect x="5" y="20" width="90" height="60" stroke="currentColor" stroke-width="2" stroke-dasharray="8 4" />
    <path d="M5 20 L25 40 M95 20 L75 40 M5 80 L25 60 M95 80 L75 60" stroke="currentColor" stroke-width="1" opacity="0.3" />
  </symbol>

</svg>
